<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenMath Pop Quiz</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .score {
      text-align: center;
      font-size: 1.3em;
      margin-bottom: 20px;
    }
    .question {
      background: rgba(255,255,255,0.15);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
    }
    button {
      padding: 12px 20px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .option-btn {
      background: rgba(255,255,255,0.9);
      color: #333;
      text-align: left;
    }
    .option-btn:hover {
      background: #fff;
      transform: translateX(5px);
    }
    .hint-btn {
      background: #f39c12;
      color: white;
      margin: 15px 0;
    }
    .feedback {
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      font-weight: bold;
    }
    .correct { background: #27ae60; }
    .wrong { background: #e74c3c; }
    .next-btn {
      background: #3498db;
      color: white;
      padding: 12px 30px;
      font-size: 1.1em;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      margin: 20px 0;
      font-size: 1.1em;
    }
    .result {
      text-align: center;
      font-size: 1.5em;
      margin: 30px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 GenMath Pop Quiz</h1>
    <p style="text-align:center;">Test your General Mathematics skills!</p>

    <div id="start-screen">
      <div class="stats">
        <div>Questions: <strong>10</strong></div>
        <div>Hints Available: <strong>3</strong></div>
      </div>
      <button onclick="startGame()" style="display:block; margin:30px auto; padding:15px 40px; font-size:1.3em;">
        Start Quiz
      </button>
    </div>

    <div id="game-screen" style="display:none;">
      <div class="score">
        Score: <span id="score">0</span> / 10
      </div>

      <div class="question">
        <p><strong>Question <span id="question-number">1</span>/10</strong></p>
        <p id="question-text"></p>
        
        <div class="options" id="options"></div>

        <button class="hint-btn" id="hint-btn" onclick="useHint()">💡 Use Hint (<span id="hints-left">3</span> left)</button>
        
        <div id="feedback" class="feedback" style="display:none;"></div>
      </div>

      <button id="next-btn" class="next-btn" onclick="nextQuestion()" style="display:none; margin:20px auto; display:block;">
        Next Question →
      </button>
    </div>

    <div id="result-screen" style="display:none;">
      <div class="result">
        <h2 id="final-message"></h2>
        <p style="font-size:2em; margin:20px 0;">Your Score: <span id="final-score">0</span>/10</p>
        <p id="percentage"></p>
      </div>
      <button onclick="restartGame()" style="padding:12px 30px; font-size:1.1em;">
        Play Again
      </button>
    </div>
  </div>

  <script>
    // Questions (same as before, randomized)
    const questions = [
      {
        q: "Which of the following relations is a function?",
        options: ["{(2,5), (2,6), (3,7)}", "{(1,3), (2,4), (3,5)}", "{(0,1), (0,2), (0,3)}", "{(4,1), (5,1), (6,1)}"],
        answer: 1, // 0-based index
        hint: "A function must have only one output for each input. No repeated x-values."
      },
      {
        q: "What is the domain of the function f(x) = √(x - 6)?",
        options: ["x ≥ 6", "x ≤ 6", "x > 6", "All real numbers"],
        answer: 0,
        hint: "The expression inside a square root must be greater than or equal to zero."
      },
      {
        q: "Simplify (x² - 49) / (x - 7)",
        options: ["x + 7", "x - 7", "x + 7, x ≠ 7", "x - 7, x ≠ 7"],
        answer: 2,
        hint: "This is a difference of squares: x² - 49 = (x-7)(x+7)"
      },
      {
        q: "Which of the following is an exponential function?",
        options: ["f(x) = 6x - 1", "f(x) = 3^x - 2", "f(x) = x^5", "f(x) = log x"],
        answer: 1,
        hint: "Exponential functions have the variable in the exponent."
      },
      {
        q: "Solve for x: 2^x = 64",
        options: ["x = 4", "x = 5", "x = 6", "x = 7"],
        answer: 2,
        hint: "64 is 2 multiplied by itself 6 times (2^6 = 64)"
      },
      {
        q: "What is the next term in the sequence 5, 8, 13, 20, __ ?",
        options: ["27", "28", "29", "30"],
        answer: 2,
        hint: "Differences: +3, +5, +7... next difference is +9"
      },
      {
        q: "Find the sum of the first 20 natural numbers (1 + 2 + ... + 20)",
        options: ["190", "200", "210", "220"],
        answer: 2,
        hint: "Use formula: n(n+1)/2 where n=20"
      },
      {
        q: "A tablet is sold for ₱12000 with a 25% discount. How much is the discount?",
        options: ["₱2500", "₱3000", "₱3500", "₱4000"],
        answer: 1,
        hint: "25% of 12000 = 0.25 × 12000"
      },
      {
        q: "If ₱40000 is invested at 8% simple interest per annum, how much interest after 5 years?",
        options: ["₱12000", "₱14000", "₱16000", "₱18000"],
        answer: 2,
        hint: "Simple Interest = Principal × Rate × Time"
      },
      {
        q: "The graph of y = 3/x is an example of a ______ function",
        options: ["Linear", "Quadratic", "Rational", "Exponential"],
        answer: 2,
        hint: "It is a ratio of two polynomials (constant over x)"
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let hintsLeft = 3;
    let shuffledQuestions = [];
    let answered = false;

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function startGame() {
      document.getElementById("start-screen").style.display = "none";
      document.getElementById("game-screen").style.display = "block";
      
      shuffledQuestions = shuffle([...questions]);
      currentQuestion = 0;
      score = 0;
      hintsLeft = 3;
      
      loadQuestion();
    }

    function loadQuestion() {
      answered = false;
      const q = shuffledQuestions[currentQuestion];
      
      document.getElementById("question-number").textContent = currentQuestion + 1;
      document.getElementById("score").textContent = score;
      document.getElementById("hints-left").textContent = hintsLeft;
      document.getElementById("question-text").textContent = q.q;
      document.getElementById("feedback").style.display = "none";
      document.getElementById("next-btn").style.display = "none";

      const optionsDiv = document.getElementById("options");
      optionsDiv.innerHTML = "";

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
        btn.onclick = () => checkAnswer(index);
        optionsDiv.appendChild(btn);
      });

      // Disable hint button if no hints left
      document.getElementById("hint-btn").disabled = hintsLeft <= 0;
    }

    function checkAnswer(selectedIndex) {
      if (answered) return;
      answered = true;

      const q = shuffledQuestions[currentQuestion];
      const isCorrect = selectedIndex === q.answer;

      const feedback = document.getElementById("feedback");
      feedback.style.display = "block";

      if (isCorrect) {
        score++;
        document.getElementById("score").textContent = score;
        feedback.className = "feedback correct";
        feedback.textContent = "✅ Correct!";
      } else {
        feedback.className = "feedback wrong";
        feedback.textContent = `❌ Wrong! The correct answer is ${String.fromCharCode(65 + q.answer)}.`;
      }

      document.getElementById("next-btn").style.display = "block";
    }

    function useHint() {
      if (hintsLeft <= 0 || answered) return;
      
      hintsLeft--;
      document.getElementById("hints-left").textContent = hintsLeft;
      
      const q = shuffledQuestions[currentQuestion];
      alert("💡 Hint: " + q.hint);
      
      if (hintsLeft <= 0) {
        document.getElementById("hint-btn").disabled = true;
      }
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < shuffledQuestions.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById("game-screen").style.display = "none";
      document.getElementById("result-screen").style.display = "block";

      const percentage = Math.round((score / 10) * 100);
      document.getElementById("final-score").textContent = score;

      let message = "";
      if (percentage >= 90) message = "🌟 Excellent! You're a GenMath Master!";
      else if (percentage >= 70) message = "👍 Great job!";
      else if (percentage >= 50) message = "🙂 Not bad! Keep practicing.";
      else message = "📚 You can do better! Review and try again.";

      document.getElementById("final-message").innerHTML = message;
      document.getElementById("percentage").textContent = `${percentage}%`;
    }

    function restartGame() {
      document.getElementById("result-screen").style.display = "none";
      document.getElementById("start-screen").style.display = "block";
    }
  </script>
</body>
</html>
